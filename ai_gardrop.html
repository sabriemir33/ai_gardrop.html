<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabri Emir | Hands-Free Eye Tracking</title>
    <script src="https://webgazer.cs.brown.edu/webgazer.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Neon Gaze Dot */
        #gaze-dot {
            position: fixed; width: 20px; height: 20px;
            background: #ff0000; border-radius: 50%;
            pointer-events: none; z-index: 9999;
            box-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000;
            display: none;
        }

        #stats {
            position: fixed; top: 10px; left: 10px;
            background: rgba(0,0,0,0.8); border: 1px solid #ff0000;
            padding: 10px; border-radius: 8px; font-family: monospace; z-index: 1000;
        }

        /* Otomatik Kalibrasyon Noktası */
        .calib-point {
            position: fixed; width: 40px; height: 40px;
            background: transparent; border: 4px solid #fff;
            border-radius: 50%; z-index: 500;
            display: flex; justify-content: center; align-items: center;
            transition: transform 0.2s;
        }
        .inner-point {
            width: 10px; height: 10px; background: #ff0000; border-radius: 50%;
        }
        .loading-ring {
            position: absolute; width: 100%; height: 100%;
            border: 4px solid transparent; border-top-color: #ff0000;
            border-radius: 50%; animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 2000; text-align: center;
        }
        button {
            padding: 15px 40px; background: #ff0000; color: white;
            border: none; border-radius: 50px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 20px rgba(255,0,0,0.4);
        }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="color: #ff0000;">GÖZ TAKİBİ KOMUTA MERKEZİ</h1>
    <p>Ekranda çıkan noktalara 2 saniye boyunca bak kanka.<br>Dokunmana gerek yok, sistem gözünü tanıyacak.</p>
    <button onclick="startGazeCalibration()">SİSTEMİ BAŞLAT 👁️</button>
</div>

<div id="stats">X: <span id="x-coord">0</span> | Y: <span id="y-coord">0</span></div>
<div id="gaze-dot"></div>

<div id="calib-target" class="calib-point" style="display:none;">
    <div class="inner-point"></div>
    <div class="loading-ring" id="loader"></div>
</div>

<script>
    const dot = document.getElementById('gaze-dot');
    const target = document.getElementById('calib-target');
    const loader = document.getElementById('loader');
    
    const points = [
        {t: '10%', l: '10%'}, {t: '10%', l: '50%'}, {t: '10%', l: '90%'},
        {t: '50%', l: '10%'}, {t: '50%', l: '50%'}, {t: '50%', l: '90%'},
        {t: '90%', l: '10%'}, {t: '90%', l: '50%'}, {t: '90%', l: '90%'}
    ];
    
    let currentPoint = 0;
    let lookTimer = null;

    async function startGazeCalibration() {
        document.getElementById('overlay').style.display = 'none';
        
        await webgazer.setGazeListener((data, time) => {
            if (!data) return;
            
            document.getElementById('x-coord').innerText = Math.round(data.x);
            document.getElementById('y-coord').innerText = Math.round(data.y);
            
            dot.style.left = data.x + 'px';
            dot.style.top = data.y + 'px';
            dot.style.display = 'block';

            checkGazeOnTarget(data.x, data.y);
        }).begin();

        webgazer.showVideo(false).showPredictionPoints(false);
        showNextPoint();
    }

    function showNextPoint() {
        if (currentPoint >= points.length) {
            target.style.display = 'none';
            alert("Süper kanka! Kalibrasyon bitti, gözlerin artık sistemde.");
            return;
        }
        target.style.top = points[currentPoint].t;
        target.style.left = points[currentPoint].l;
        target.style.display = 'flex';
        loader.style.display = 'none';
    }

    function checkGazeOnTarget(gx, gy) {
        const rect = target.getBoundingClientRect();
        const padding = 50; // Bakış hassasiyeti için tolerans payı

        if (gx > rect.left - padding && gx < rect.right + padding &&
            gy > rect.top - padding && gy < rect.bottom + padding) {
            
            if (!lookTimer) {
                loader.style.display = 'block';
                lookTimer = setTimeout(() => {
                    webgazer.recordScreenPosition(rect.left + 20, rect.top + 20, 'click');
                    currentPoint++;
                    lookTimer = null;
                    showNextPoint();
                }, 2000); // 2 saniye odaklanma süresi
            }
        } else {
            clearTimeout(lookTimer);
            lookTimer = null;
            loader.style.display = 'none';
        }
    }
</script>

</body>
</html>
